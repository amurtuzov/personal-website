name: Build And Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_HEALTHCHECK_URL: https://api.amurtuzov.com/api/health

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      non_photos_matrix: ${{ steps.select-matrix.outputs.non_photos_matrix }}
      has_non_photos: ${{ steps.select-matrix.outputs.has_non_photos }}
      photos_matrix: ${{ steps.select-matrix.outputs.photos_matrix }}
      has_photos: ${{ steps.select-matrix.outputs.has_photos }}
      non_photos_service_args: ${{ steps.select-matrix.outputs.non_photos_service_args }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'package.json'
              - 'yarn.lock'
              - '.dockerignore'
            nginx:
              - 'infra/nginx/**'
            main:
              - 'apps/main/**'
            photos:
              - 'apps/photos/**'
            cms:
              - 'apps/cms/**'
            backend:
              - 'services/backend/**'
            database:
              - 'packages/database/**'
            migrate:
              - 'infra/Dockerfile'
            image_worker:
              - 'services/image-worker/**'
            email_worker:
              - 'services/email-worker/**'
            cleanup_worker:
              - 'services/cleanup-worker/**'
            ops_bot:
              - 'services/ops-bot/**'

      - name: Select image build matrix
        id: select-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_SHARED: ${{ steps.changes.outputs.shared }}
          CHANGED_NGINX: ${{ steps.changes.outputs.nginx }}
          CHANGED_MAIN: ${{ steps.changes.outputs.main }}
          CHANGED_PHOTOS: ${{ steps.changes.outputs.photos }}
          CHANGED_CMS: ${{ steps.changes.outputs.cms }}
          CHANGED_BACKEND: ${{ steps.changes.outputs.backend }}
          CHANGED_DATABASE: ${{ steps.changes.outputs.database }}
          CHANGED_MIGRATE: ${{ steps.changes.outputs.migrate }}
          CHANGED_IMAGE_WORKER: ${{ steps.changes.outputs.image_worker }}
          CHANGED_EMAIL_WORKER: ${{ steps.changes.outputs.email_worker }}
          CHANGED_CLEANUP_WORKER: ${{ steps.changes.outputs.cleanup_worker }}
          CHANGED_OPS_BOT: ${{ steps.changes.outputs.ops_bot }}
        run: |
          set -euo pipefail

          add_image() {
            local candidate="$1"
            for existing in "${images[@]}"; do
              if [[ "$existing" == "$candidate" ]]; then
                return 0
              fi
            done
            images+=("$candidate")
          }

          images=()

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            images=(main photos cms backend image-worker email-worker cleanup-worker migrate ops-bot)
          elif [[ "$CHANGED_SHARED" == "true" ]]; then
            images=(main photos cms backend image-worker email-worker cleanup-worker migrate ops-bot)
          else
            if [[ "$CHANGED_MAIN" == "true" || "$CHANGED_NGINX" == "true" ]]; then add_image "main"; fi
            if [[ "$CHANGED_PHOTOS" == "true" || "$CHANGED_NGINX" == "true" ]]; then add_image "photos"; fi
            if [[ "$CHANGED_CMS" == "true" || "$CHANGED_NGINX" == "true" ]]; then add_image "cms"; fi

            if [[ "$CHANGED_BACKEND" == "true" ]]; then add_image "backend"; fi
            if [[ "$CHANGED_DATABASE" == "true" ]]; then
              add_image "backend"
              add_image "image-worker"
              add_image "migrate"
            fi
            if [[ "$CHANGED_MIGRATE" == "true" ]]; then add_image "migrate"; fi

            if [[ "$CHANGED_IMAGE_WORKER" == "true" ]]; then add_image "image-worker"; fi
            if [[ "$CHANGED_EMAIL_WORKER" == "true" ]]; then add_image "email-worker"; fi
            if [[ "$CHANGED_CLEANUP_WORKER" == "true" ]]; then add_image "cleanup-worker"; fi
            if [[ "$CHANGED_OPS_BOT" == "true" ]]; then add_image "ops-bot"; fi
          fi

          include='[]'
          for image in "${images[@]}"; do
            case "$image" in
              main)
                dockerfile="apps/main/Dockerfile"
                build_args="NUXT_PUBLIC_API_URL=https://api.amurtuzov.com"
                ;;
              photos)
                dockerfile="apps/photos/Dockerfile"
                build_args=""
                ;;
              cms)
                dockerfile="apps/cms/Dockerfile"
                build_args="VITE_API_URL=https://api.amurtuzov.com"
                ;;
              backend)
                dockerfile="services/backend/Dockerfile"
                build_args=""
                ;;
              image-worker)
                dockerfile="services/image-worker/Dockerfile"
                build_args=""
                ;;
              email-worker)
                dockerfile="services/email-worker/Dockerfile"
                build_args=""
                ;;
              cleanup-worker)
                dockerfile="services/cleanup-worker/Dockerfile"
                build_args=""
                ;;
              migrate)
                dockerfile="infra/Dockerfile"
                build_args=""
                ;;
              ops-bot)
                dockerfile="services/ops-bot/Dockerfile"
                build_args=""
                ;;
              *)
                echo "Unknown image value: $image" >&2
                exit 1
                ;;
            esac

            include="$(jq -c \
              --arg image "$image" \
              --arg dockerfile "$dockerfile" \
              --arg build_args "$build_args" \
              '. + [{image: $image, dockerfile: $dockerfile, build_args: $build_args}]' \
              <<<"$include")"
          done

          non_photos_include="$(jq -c '[.[] | select(.image != "photos")]' <<<"$include")"
          photos_include="$(jq -c '[.[] | select(.image == "photos")]' <<<"$include")"

          non_photos_matrix="$(jq -c --argjson include "$non_photos_include" '{include: $include}' <<< '{}')"
          photos_matrix="$(jq -c --argjson include "$photos_include" '{include: $include}' <<< '{}')"

          if [[ "$(jq 'length' <<<"$non_photos_include")" -gt 0 ]]; then
            has_non_photos=true
          else
            has_non_photos=false
          fi

          if [[ "$(jq 'length' <<<"$photos_include")" -gt 0 ]]; then
            has_photos=true
          else
            has_photos=false
          fi

          non_photos_service_args="$(jq -r 'map(.image) | join(" ")' <<<"$non_photos_include")"

          echo "non_photos_matrix=$non_photos_matrix" >> "$GITHUB_OUTPUT"
          echo "has_non_photos=$has_non_photos" >> "$GITHUB_OUTPUT"
          echo "photos_matrix=$photos_matrix" >> "$GITHUB_OUTPUT"
          echo "has_photos=$has_photos" >> "$GITHUB_OUTPUT"
          echo "non_photos_service_args=$non_photos_service_args" >> "$GITHUB_OUTPUT"
          echo "Selected non-photos matrix: $non_photos_matrix"
          echo "Selected photos matrix: $photos_matrix"

  build-non-photos:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_non_photos == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.non_photos_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-website-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/personal-website-${{ matrix.image }}:main
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-non-photos:
    needs: [detect-changes, build-non-photos]
    if: |
      needs.detect-changes.outputs.has_non_photos == 'true' &&
      needs.build-non-photos.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          envs: GITHUB_SHA,GHCR_USERNAME,GHCR_PAT,IMAGE_NAMESPACE
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/personal-website
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            IMAGE_REGISTRY=ghcr.io IMAGE_NAMESPACE="$IMAGE_NAMESPACE" IMAGE_TAG=main ENV_FILE=.env ./scripts/deploy-registry.sh ${{ needs.detect-changes.outputs.non_photos_service_args }}

  wait-backend-ready:
    needs: [detect-changes, build-non-photos, deploy-non-photos]
    if: |
      needs.detect-changes.outputs.has_photos == 'true' &&
      (
        needs.detect-changes.outputs.has_non_photos == 'false' ||
        (needs.build-non-photos.result == 'success' && needs.deploy-non-photos.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend health endpoint
        env:
          HEALTH_URL: ${{ env.BACKEND_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          echo "Waiting for backend readiness at: ${HEALTH_URL}"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "${HEALTH_URL}" >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Attempt ${attempt}/30 failed, retrying in 5s..."
            sleep 5
          done
          echo "Backend readiness check failed."
          exit 1

  build-photos:
    needs: [detect-changes, wait-backend-ready]
    if: |
      needs.detect-changes.outputs.has_photos == 'true' &&
      needs.wait-backend-ready.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.photos_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-website-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/personal-website-${{ matrix.image }}:main
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-photos:
    needs: [detect-changes, build-photos]
    if: |
      needs.detect-changes.outputs.has_photos == 'true' &&
      needs.build-photos.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy photos to droplet over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          envs: GITHUB_SHA,GHCR_USERNAME,GHCR_PAT,IMAGE_NAMESPACE
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/personal-website
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            IMAGE_REGISTRY=ghcr.io IMAGE_NAMESPACE="$IMAGE_NAMESPACE" IMAGE_TAG=main ENV_FILE=.env ./scripts/deploy-registry.sh photos
