<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anar Murtuzov | Mobile Menu</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <section class="mobile-stage">
      <div class="mobile-frame">
        <div class="mobile-topbar">
          <div class="mobile-brand-wrap">
            <img class="mobile-logo-chip" src="./logo-anar.svg" alt="" aria-hidden="true" />
            <p class="mobile-brand-name">Anar Murtuzov</p>
          </div>
          <a class="burger burger-close" href="./mobile-home.html" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6L18 18" stroke="currentColor" stroke-linecap="round" />
              <path d="M18 6L6 18" stroke="currentColor" stroke-linecap="round" />
            </svg>
          </a>
        </div>
        <main class="mobile-main">
          <div class="mobile-grid">
            <img src="https://picsum.photos/seed/m001/760/520" alt="Mobile photo 1" />
            <img src="https://picsum.photos/seed/m002/760/520" alt="Mobile photo 2" />
            <img src="https://picsum.photos/seed/m003/760/520" alt="Mobile photo 3" />
            <img src="https://picsum.photos/seed/m004/760/520" alt="Mobile photo 4" />
            <img src="https://picsum.photos/seed/m005/760/520" alt="Mobile photo 5" />
          </div>
        </main>
        <div class="offcanvas-backdrop"></div>
        <aside class="offcanvas">
          <div class="offcanvas-head">
            <p class="menu-title">Navigation</p>
            <a class="burger burger-close" href="./mobile-home.html" aria-label="Close menu">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 6L18 18" stroke="currentColor" stroke-linecap="round" />
                <path d="M18 6L6 18" stroke="currentColor" stroke-linecap="round" />
              </svg>
            </a>
          </div>
          <nav>
            <a href="./mobile-home.html">Home</a>
            <a href="./mobile-albums.html">Albums</a>
            <a href="./mobile-contact.html">Contact</a>
            <a href="https://anarmurtuzov.com" target="_blank" rel="noreferrer">Dev Portfolio</a>
          </nav>
          <div class="sidebar-social">
            <a href="https://instagram.com" target="_blank" rel="noreferrer" aria-label="Instagram">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" />
                <circle cx="12" cy="12" r="4" stroke="currentColor" />
                <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
              </svg>
            </a>
          </div>
        </aside>
      </div>
    </section>
  </body>
</html>
