<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Anar Murtuzov | Mobile Home</title>
    <link rel="stylesheet" href="./styles.css" />

  <body>
    <section class="mobile-stage">
      <div class="mobile-frame">

            <p class="mobile-brand-name">Anar Murtuzov</p>
          </div>
          <a class="burger burger-open" href="./mobile-menu.html" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7.5H20" stroke="currentColor" stroke-linecap="round" />
              <path d="M4 12H20" stroke="currentColor" stroke-linecap="round" />
              <path d="M4 16.5H15" stroke="currentColor" stroke-linecap="round" />
            </svg>
          </a>
        </header>
        <main class="mobile-main">
          <div class="mobile-grid">
            <a href="./mobile-viewer.html"><img src="https://picsum.photos/seed/mh001/900/680" alt="Mobile home photo 1" /></a>
            <a href="./mobile-viewer.html"><img src="https://picsum.photos/seed/mh002/900/680" alt="Mobile home photo 2" /></a>
            <a href="./mobile-viewer.html"><img src="https://picsum.photos/seed/mh003/900/680" alt="Mobile home photo 3" /></a>
            <a href="./mobile-viewer.html"><img src="https://picsum.photos/seed/mh004/900/680" alt="Mobile home photo 4" /></a>
            <a href="./mobile-viewer.html"><img src="https://picsum.photos/seed/mh005/900/680" alt="Mobile home photo 5" /></a>
          </div>
          <p class="state-line">Loading more photos...</p>
        </main>
      </div>
    </section>
  </body>
</html>
