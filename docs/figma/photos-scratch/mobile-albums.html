<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anar Murtuzov | Mobile Albums</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <section class="mobile-stage">
      <div class="mobile-frame">
        <header class="mobile-topbar">
          <div class="mobile-brand-wrap">
            <img class="mobile-logo-chip" src="./logo-anar.svg" alt="" aria-hidden="true" />
            <p class="mobile-brand-name">Anar Murtuzov</p>
          </div>
          <a class="burger burger-open" href="./mobile-menu.html" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7.5H20" stroke="currentColor" stroke-linecap="round" />
              <path d="M4 12H20" stroke="currentColor" stroke-linecap="round" />
              <path d="M4 16.5H15" stroke="currentColor" stroke-linecap="round" />
            </svg>
          </a>
        </header>
        <main class="mobile-main">
          <div class="mobile-grid">
            <a class="mobile-album-card" href="./mobile-album.html"><img src="https://picsum.photos/seed/ma001/800/800" alt="Mobile album 1" /><p>Sri Lanka</p><span>21 photos</span></a>
            <a class="mobile-album-card" href="./mobile-album.html"><img src="https://picsum.photos/seed/ma002/800/800" alt="Mobile album 2" /><p>Mountain Winter</p><span>16 photos</span></a>
            <a class="mobile-album-card" href="./mobile-album.html"><img src="https://picsum.photos/seed/ma003/800/800" alt="Mobile album 3" /><p>City Rain</p><span>28 photos</span></a>
            <a class="mobile-album-card" href="./mobile-album.html"><img src="https://picsum.photos/seed/ma004/800/800" alt="Mobile album 4" /><p>Street Frames</p><span>31 photos</span></a>
          </div>
          <p class="state-line">End of album list.</p>
        </main>
      </div>
    </section>
  </body>
</html>
