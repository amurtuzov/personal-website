<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anar Murtuzov | Mobile Viewer</title>
    <link rel="stylesheet" href="./styles.css" />

  <body>
    <section class="mobile-stage">
      <div class="mobile-frame mobile-viewer-frame">

            <img class="mobile-logo-chip" src="./logo-anar.svg" alt="" aria-hidden="true" />
            <p class="mobile-brand-name">Anar Murtuzov</p>
          </div>
          <a class="burger" href="./mobile-home.html" aria-label="Back to feed">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M16 6L8 12L16 18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
        </header>
        <main class="mobile-main mobile-viewer">
          <img src="https://picsum.photos/seed/mv001/1200/860" alt="Mobile viewer image" />
          <section class="mobile-viewer-meta">
            <h2>Cold Morning Ridge</h2>
            <p>Shot 07/42</p>
            <p>
              First light cutting through low cloud near the pass. Captured before
              sunrise while heading north.
            </p>
            <p>EXIF: Sony A7 IV | 42mm | f/5.6 | 1/500 | ISO 320</p>
          </section>
          <div class="mobile-nav-row">
            <a href="./mobile-viewer.html">Previous</a>
            <a href="./mobile-viewer.html">Next</a>

        </main>
