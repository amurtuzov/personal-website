<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anar Murtuzov | Contact</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-wrap">
          <img class="logo-chip" src="./logo-anar.svg" alt="" aria-hidden="true" />
          <div>
            <p class="brand-name">Anar Murtuzov</p>
            <p class="brand-sub">Visual Journal</p>
          </div>
        </div>
        <nav class="main-nav">
          <a href="./home.html">Home</a>
          <a href="./albums.html">Albums</a>
          <a class="active" href="./contact.html">Contact</a>
          <a href="https://anarmurtuzov.com" target="_blank" rel="noreferrer">Dev Portfolio</a>
        </nav>
        <div class="sidebar-social">
          <a href="https://instagram.com" target="_blank" rel="noreferrer" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" />
              <circle cx="12" cy="12" r="4" stroke="currentColor" />
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
            </svg>
          </a>
        </div>
      </aside>
      <main class="content">
        <div class="contact-wrap">
          <section class="contact-head">
            <h1>Get in touch</h1>
          </section>
          <div class="contact-grid">
            <article class="about-card">
              <img class="about-photo" src="https://picsum.photos/seed/anar-portrait/900/1100" alt="Portrait of Anar Murtuzov" />
              <div class="about-info">
                <p class="about-copy">
                  Photography is my hobby, and I do it for myself.
                </p>
                <p class="about-copy">
                  I shoot quietly while traveling or walking around the city.
                  This project is my personal visual journal.
                </p>
              </div>
            </article>
            <form class="contact-form">
              <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" />
              </div>
              <div class="field field-full">
                <label for="message">Message</label>
                <textarea id="message"></textarea>
              </div>
              <div class="submit-row">
                <button type="button">Send message</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
